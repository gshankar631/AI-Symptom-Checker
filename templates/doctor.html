<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<body id="doctor-page">
    <h1>Suggested Doctor</h1>
    <div class="result">
        <p><strong>Possible Condition:</strong> {{ condition }}</p>
        <p><strong>Recommended Doctor:</strong> {{ doctor }}</p>
    </div>

    <a class="button" href="{{ url_for('booking', condition=condition, doctor=doctor) }}">Book Appointment</a>
    <br>
    <a class="button" href="{{ url_for('check') }}">Back</a>
</body>
